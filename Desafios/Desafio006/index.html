<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explicando Itens HTML</title>
</head>
<body>
    <h1>Tags em HTML5</h1>
    <p>No HTML5 podemos mostrar explicações de termos, passe o mouse na palavra para saber mais.</p>
    <ul>
        <li><abbr title="Usa-se &lt;p&gt; para um novo parágrafo.">Paragrafo</abbr></li>
        <li><abbr title="Usa-se &lt;(h1,h2,h3...)&gt; para um novo título ou subtítulo.">Títulos</abbr></li>
        <li><abbr title="Usa-se &lt;ol&gt; para uma nova lista ordenada, ou seja tem ordem crescente ou decrescente.">Listas Ordenadas</abbr></li>
        <li><abbr title="Usa-se &lt;ul&gt; para uma nova para uma lista que não tem ordem numérica ou algo do tipo.">Lista Não Ordenadas</abbr></li>
        <li><abbr title="Usa-se &lt;strong&gt; para um novo texto forte ou grifado para destacar.">Deixar grifado/forte</abbr></li>
        <li><abbr title="Usa-se &lt;ins&gt; para um novo texto adicionado ou sublinhado.">Deixar Sublinhado/Inserido</abbr></li>
        <li><abbr title="Usa-se &lt;a&gt; para um novo texto redirecionado com um link embutido nele.">Colocar Links nas frases</abbr></li>
    </ul>
</body>
</html>
