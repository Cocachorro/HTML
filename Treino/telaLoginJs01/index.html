<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino tela Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main>
        <h1>Faça o Login</h1>
        <p>Digite o usuário e senha:</p>
        <form>
            <label for="usuario">Usuário:</label>
            <input id="ipt_usuario" type="text" placeholder="Seu usuário..." required>
            <label for="senha">Senha:</label>
            <input id="ipt_senha" type="password" placeholder="******" minlength="6" required>
            <button id="btn_entrar" type="submit">Entrar</button>
        </form>
    </main>
</body>
</html>
